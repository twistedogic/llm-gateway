# configs/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "llm-gateway"
    static_configs:
      - targets: ["host.docker.internal:9090"]  # Prometheus metrics port
        labels:
          service: llm-gateway

  - job_name: "temporal"
    static_configs:
      - targets: ["host.docker.internal:7233"]
        labels:
          service: temporal

  - job_name: "otel-collector"
    static_configs:
      - targets: ["host.docker.internal:4317"]
        labels:
          service: otel-collector
