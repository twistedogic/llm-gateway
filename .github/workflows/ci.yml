name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  GO_VERSION: "1.23"
  CGO_ENABLED: 0

jobs:
  # ============================================
  # Quality Checks: Lint, Format, Security
  # ============================================
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code not formatted. Run 'gofmt -w .'"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

  # ============================================
  # Test Matrix
  # ============================================
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23", "1.24"]
        os: [ubuntu-latest, macos-latest, windows-latest]
        exclude:
          - go-version: "1.24"
            os: windows-latest  # 1.24 not yet stable on Windows

    env:
      # Race detector requires CGO; enable for testing
      # Note: Windows race detector may have issues, run without race on Windows
      CGO_ENABLED: ${{ matrix.os == 'windows-latest' && '0' || '1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        # Use bash explicitly for cross-platform compatibility
        # Race detector requires CGO and works on Linux/macOS
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go test -v -coverprofile=coverage.out -covermode=atomic ./...
          else
            go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.23'
        with:
          name: coverage
          path: coverage.out

      - name: Run benchmarks (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: go test -bench=. -benchmem -run=^$ ./... 2>&1 | head -50

  # ============================================
  # Build Verification
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify build compiles
        run: go build -n ./... 2>&1 | head -20

      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=${{ env.CGO_ENABLED }} go build -ldflags "-X main.Version=ci" -o bin/llm-gateway ./cmd/gateway

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: llm-gateway-${{ runner.os }}
          path: bin/llm-gateway

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security
    runs-on: ubuntu-latest
    # govulncheck requires latest Go for latest dependencies
    # Note: Skip govulncheck until Go 1.25 is available in CI or vulns are fixed
    # See: https://pkg.go.dev/vuln/GO-2026-4602, GO-2026-4601
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # TODO: Re-enable govulncheck when Go 1.25 is available in CI
      # govulncheck requires Go 1.25.8+ to fix GO-2026-4602, GO-2026-4601
      # - name: Run govulncheck
      #   run: |
      #     go install golang.org/x/vuln/cmd/govulncheck@latest
      #     govulncheck ./...

      - name: Run gosec
        run: |
          which gosec || go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./... || true  # Don't fail on findings

      # Note: SARIF upload skipped - requires codeql-action v4+ with proper permissions
      # See: https://github.com/github/codeql-action/issues/2044

  # ============================================
  # Dependency Audit
  # ============================================
  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.sum integrity
        run: |
          go mod verify

      - name: Check for outdated dependencies
        run: |
          go install github.com/psampaz/go-mod-outdated@latest
          go-mod-outdated -direct

  # ============================================
  # Code Coverage Report
  # ============================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: always() && !cancelled() && github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Generate coverage report
        run: |
          # Skip coverage reporting if no coverage file or on main branch
          if [ ! -f coverage/coverage.out ]; then
            echo "No coverage file found, skipping report"
            exit 0
          fi
          echo "Coverage report available at: coverage/coverage.out"
          head -20 coverage/coverage.out

      - name: Add coverage comment
        uses: romeovs/lcov-reporter-action@v0.3.1
        if: github.event_name == 'pull_request'
        with:
          lcov-file: coverage/coverage.out
          github-token: ${{ secrets.GITHUB_TOKEN }}
